<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile G capacity dashboard — profile-g-three-peer-exclusive-v1</title>
<style>
body{font:16px system-ui,sans-serif;margin:0;background:#101827;color:#e8eef8}main{max-width:1050px;margin:auto;padding:2rem}h1{font-size:1.7rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}.card{background:#19253a;border:1px solid #34445f;border-radius:10px;padding:1rem}.value{font-size:2rem;font-weight:700;color:#73e0b1}.bar{height:1rem;background:#24334d;border-radius:1rem;overflow:hidden}.bar span{display:block;height:100%;background:#6fa8ff}table{width:100%;border-collapse:collapse}th,td{padding:.6rem;text-align:left;border-bottom:1px solid #34445f}.pass{color:#73e0b1}.fail{color:#ff8585}small{color:#aebbd0}
</style></head><body><main><h1>Profile G capacity dashboard — profile-g-three-peer-exclusive-v1</h1><p id="summary"></p><section class="grid" id="cards"></section><h2>Peer capacity and fairness</h2><section id="peers"></section><h2>Recovery incidents</h2><section id="recovery"></section><h2>Acceptance checks</h2><section id="checks"></section><p><small>Scheduled capacity is deterministic. Host harness rate is diagnostic only.</small></p></main>
<script type="application/json" id="benchmark-data">{"acceptance_thresholds": {"maximum_duplicate_completion_events": 0, "maximum_policy_bypasses": 0, "maximum_recovery_ms": 5001, "maximum_starved_tasks": 0, "maximum_wait_ms": 1000, "minimum_jain_fairness": 0.99, "minimum_throughput_gain": 2.5}, "accepted": true, "checks": {"all_faults_recovered": true, "bounded_duplicates": true, "bounded_recovery": true, "bounded_wait": true, "converged": true, "fairness": true, "no_policy_bypass": true, "no_starvation": true, "throughput_gain": true}, "measurement_contract": {"fault_recovery": "deterministic clock from isolation to a majority-issued successor fence", "harness_rate": "wall-clock durable harness rate; diagnostic only and not compared with the baseline", "scheduled_capacity": "task_count / declared service-time makespan; deterministic and used for the gain gate"}, "metrics": {"baseline": {"name": "single-owner-fifo", "parallelism": 1, "scheduled_makespan_ms": 3000, "scheduled_throughput_tasks_per_second": 10.0}, "fairness": {"completed_by_peer": {"did:web:peer-a.example": 10, "did:web:peer-b.example": 10, "did:web:peer-c.example": 10}, "jain_index": 1.0, "maximum_wait_ms": 980, "service_jain_index": 0.995157, "service_ms_by_peer": {"did:web:peer-a.example": 920, "did:web:peer-b.example": 990, "did:web:peer-c.example": 1090}, "starved_tasks": 0}, "fault_recovery": {"injected_faults": 3, "maximum_recovery_ms": 5001, "recovered_faults": 3, "recoveries": [{"failed_peer": "did:web:peer-c.example", "new_fencing_token": 2, "recovery_ms": 5001, "stale_fence_rejected": true, "takeover_peer": "did:web:peer-a.example", "task_index": 8}, {"failed_peer": "did:web:peer-a.example", "new_fencing_token": 2, "recovery_ms": 5001, "stale_fence_rejected": true, "takeover_peer": "did:web:peer-b.example", "task_index": 18}, {"failed_peer": "did:web:peer-b.example", "new_fencing_token": 2, "recovery_ms": 5001, "stale_fence_rejected": true, "takeover_peer": "did:web:peer-c.example", "task_index": 28}]}, "profile_g": {"harness_elapsed_seconds": 1.066187, "harness_tasks_per_second": 28.137657, "parallelism": 3, "scheduled_makespan_ms": 1090, "scheduled_throughput_tasks_per_second": 27.522936, "throughput_gain": 2.752294}, "safety": {"completion_retry_attempts": 30, "duplicate_attempts": 60, "duplicate_completion_events": 0, "frontiers_converged": true, "policy_bypasses": 0, "policy_denials": 3, "replay_attempts": 30}}, "peer_count": 3, "publication_date": "2026-07-12", "schema": "mcp++/profile-g/performance-report@1", "task_count": 30, "workload_id": "profile-g-three-peer-exclusive-v1"}</script><script>
const r=JSON.parse(document.getElementById('benchmark-data').textContent),m=r.metrics;
document.getElementById('summary').innerHTML=`Published ${r.publication_date} — <strong class="${r.accepted?'pass':'fail'}">${r.accepted?'PASS':'FAIL'}</strong>`;
const cards=[['Throughput gain',m.profile_g.throughput_gain+'x'],['Profile G capacity',m.profile_g.scheduled_throughput_tasks_per_second+' tasks/s'],['Service fairness',m.fairness.service_jain_index],['Max recovery',m.fault_recovery.maximum_recovery_ms+' ms']];
document.getElementById('cards').innerHTML=cards.map(x=>`<article class="card"><div>${x[0]}</div><div class="value">${x[1]}</div></article>`).join('');
const counts=m.fairness.completed_by_peer,max=Math.max(...Object.values(counts));
document.getElementById('peers').innerHTML=Object.entries(counts).map(([p,n])=>`<p><code>${p}</code> — ${n} tasks</p><div class="bar"><span style="width:${100*n/max}%"></span></div>`).join('');
document.getElementById('recovery').innerHTML='<table><thead><tr><th>Task</th><th>Failed peer</th><th>Takeover peer</th><th>Recovery</th><th>Stale fence</th></tr></thead><tbody>'+m.fault_recovery.recoveries.map(x=>`<tr><td>${x.task_index}</td><td>${x.failed_peer}</td><td>${x.takeover_peer}</td><td>${x.recovery_ms} ms</td><td>${x.stale_fence_rejected?'rejected':'ERROR'}</td></tr>`).join('')+'</tbody></table>';
document.getElementById('checks').innerHTML='<table><tbody>'+Object.entries(r.checks).map(([k,v])=>`<tr><td>${k.replaceAll('_',' ')}</td><td class="${v?'pass':'fail'}">${v?'PASS':'FAIL'}</td></tr>`).join('')+'</tbody></table>';
</script></body></html>
